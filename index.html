<body>
  <form action=''>
    <label for="interiors">Interiors:</label>
    <input type="text" id="interiors" name="interiors">
    <label for="interiors">How many?</label>
    <input type="text" id="count" name="count">
    <button type="button" name="sendButton">Calculate</button>
  </form>
  <ul>
    
  </ul>
<script>
  function lottery(items, count) {
    // Shuffle
    const shuffled = [...items].sort(() => Math.random() - 0.5);

    // Pick X items
    const selected = shuffled.slice(0, count);

    // Generate random weights
    const weights = selected.map(() => Math.random());

    // Normalize to 100%
    const total = weights.reduce((a, b) => a + b, 0);

    return selected.map((item, i) => ({
        item,
        percent: ((weights[i] / total) * 100).toFixed(2) + "%"
    }));
  }
  
  const button = document.querySelector("button");

  button.addEventListener("click", (event) => {
  const unparsedList= document.querySelector("#interiors").value;
    
    console.log(unparsedList);
  const itemCount= document.querySelector("#count").value;
    console.log(itemCount);
  
  const biomes= lottery(unparsedList.split(",").map(item => item.trim()).filter(Boolean), itemCount);
  const list= document.querySelector("ul");
    console.log(biomes);
  biomes.forEach((item) => {
    console.log(item); 
    list.append("<li>"+item+":, "+percent+"</li>");
  });
    
});


</script>
